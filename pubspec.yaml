name: promptdojo
description: "IBM Bob Hackathon"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # UI Animations
  animated_text_kit: ^4.2.2
  
  # SVG Support
  flutter_svg: ^2.0.10
  
  # Audio
  audioplayers: ^6.0.0
  
  # HTTP Client
  http: ^1.2.0
  
  # Environment Variables

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/sounds/
